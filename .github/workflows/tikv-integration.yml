# Runs real PD+TiKV against proofstore/tikv integration tests (not skipped).
# PRs only run when TiKV-related paths change; use workflow_dispatch for manual runs.

name: TiKV integration

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/tikv-integration.yml"
      - "docker-compose.tikv.yml"
      - "internal/proofstore/factory.go"
      - "internal/proofstore/tikv/**"
      - "scripts/tikv-dev.sh"
      - "scripts/tikv-dev.ps1"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/tikv-integration.yml"
      - "docker-compose.tikv.yml"
      - "internal/proofstore/factory.go"
      - "internal/proofstore/tikv/**"
      - "scripts/tikv-dev.sh"
      - "scripts/tikv-dev.ps1"

permissions:
  contents: read

concurrency:
  group: tikv-integration-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  proofstore-tikv:
    name: proofstore/tikv (PD+TiKV)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Start PD+TiKV
        shell: bash
        run: |
          set -euxo pipefail
          # Use compose healthchecks (see docker-compose.tikv.yml); first pull can exceed a short curl loop.
          docker compose -f docker-compose.tikv.yml up -d --wait --wait-timeout 600

      - name: Run TiKV integration tests
        env:
          TRUSTDB_TIKV_PD_ENDPOINTS: 127.0.0.1:2379
        run: go test -count=1 -mod=readonly -tags=integration ./internal/proofstore/tikv

      - name: Tear down PD+TiKV
        if: always()
        shell: bash
        run: docker compose -f docker-compose.tikv.yml down -v
