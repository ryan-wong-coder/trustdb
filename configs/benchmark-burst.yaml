# Maximizes short-lived accepted-receipt throughput and burst absorption.
# This profile is intentionally unsafe across host power loss.
run_profile: benchmark

paths:
  data_dir: ".trustdb-bench-burst"
  wal: ".trustdb-bench-burst/wal"
  object_dir: ".trustdb-bench-burst/objects"
  proof_dir: ".trustdb-bench-burst/proofs"

metastore: "pebble"
metastore_path: ".trustdb-bench-burst/pebble"

server:
  queue_size: 65536
  workers: 32
  read_timeout: "30s"
  read_header_timeout: "5s"
  write_timeout: "120s"
  idle_timeout: "120s"
  shutdown_timeout: "30s"

proofstore:
  record_index_mode: "time_only"
  artifact_sync_mode: "batch"

wal:
  fsync_mode: "batch"
  group_commit_interval: "50ms"

batch:
  queue_size: 524288
  max_records: 16384
  max_delay: "500ms"
  proof_mode: "async"
  materializer_workers: 2
  materializer_queue_size: 4
  materializer_poll_interval: "250ms"
  proof_workers: 0

global_log:
  enabled: false

anchor:
  scope: "global"
  max_delay: "5m"
  poll_interval: "250ms"
  workers: 4
  sink: "off"

log:
  level: "warn"
  format: "json"
  output: "stderr"
