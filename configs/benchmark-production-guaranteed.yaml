# Conservative durability floor: every accepted receipt follows a WAL fsync.
run_profile: benchmark

paths:
  data_dir: ".trustdb-bench-guaranteed"
  wal: ".trustdb-bench-guaranteed/wal"
  object_dir: ".trustdb-bench-guaranteed/objects"
  proof_dir: ".trustdb-bench-guaranteed/proofs"

metastore: "pebble"
metastore_path: ".trustdb-bench-guaranteed/pebble"

server:
  queue_size: 8192
  workers: 4
  read_timeout: "30s"
  read_header_timeout: "5s"
  write_timeout: "120s"
  idle_timeout: "120s"
  shutdown_timeout: "30s"

proofstore:
  record_index_mode: "full"
  artifact_sync_mode: "chunk"

wal:
  fsync_mode: "strict"
  group_commit_interval: "10ms"

batch:
  queue_size: 65536
  max_records: 4096
  max_delay: "100ms"
  proof_mode: "async"
  materializer_workers: 2
  materializer_queue_size: 4
  materializer_poll_interval: "250ms"
  proof_workers: 0

global_log:
  enabled: true
  log_id: "trustdb-bench-guaranteed"

anchor:
  scope: "global"
  max_delay: "5m"
  poll_interval: "250ms"
  workers: 4
  sink: "ots"
  ots:
    calendars: []
    min_accepted: 1
    timeout: "20s"
    upgrade:
      enabled: true
      interval: "1h"
      batch_size: 128
      timeout: "30s"
      workers: 4

log:
  level: "warn"
  format: "json"
  output: "stderr"
