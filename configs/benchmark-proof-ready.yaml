# Prioritizes complete L3 proof availability over peak accepted-receipt TPS.
run_profile: benchmark

paths:
  data_dir: ".trustdb-bench-proof-ready"
  wal: ".trustdb-bench-proof-ready/wal"
  object_dir: ".trustdb-bench-proof-ready/objects"
  proof_dir: ".trustdb-bench-proof-ready/proofs"

metastore: "pebble"
metastore_path: ".trustdb-bench-proof-ready/pebble"

server:
  queue_size: 32768
  workers: 8
  read_timeout: "30s"
  read_header_timeout: "5s"
  write_timeout: "120s"
  idle_timeout: "120s"
  shutdown_timeout: "30s"

proofstore:
  record_index_mode: "time_only"
  artifact_sync_mode: "batch"

wal:
  fsync_mode: "batch"
  group_commit_interval: "50ms"

batch:
  queue_size: 131072
  max_records: 8192
  max_delay: "200ms"
  proof_mode: "async"
  materializer_workers: 8
  materializer_queue_size: 16
  materializer_poll_interval: "250ms"
  proof_workers: 0

global_log:
  enabled: false

anchor:
  scope: "global"
  max_delay: "5m"
  poll_interval: "250ms"
  workers: 4
  sink: "off"

log:
  level: "warn"
  format: "json"
  output: "stderr"
